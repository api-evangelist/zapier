  /v1/zap-templates:
    get:
      operationId: v1_zap_templates_list
      description: List popular Zap Templates using your app. See our List Zap Templates guide to get started.
      summary: Zapier Get Zap Templates
      parameters:
        - in: query
          name: apps
          schema:
            type: string
          description: |-
            A comma separated list of Zapier Apps to match Zap templates against. Note:
            - Your app will always be one of the apps in the template
            - The list will return Zap Templates with all the provided apps, not a subset
          example: mailchimp
        - in: query
          name: limit
          schema:
            type: number
            default: 5
          description: '(Max: 100) Limit the number of Zap templates returned.'
          example: 5
        - in: query
          name: offset
          schema:
            type: number
            default: 0
          description: The number of Zap templates to skip before beginning to return the Zap templates. The default value is 0, which is the offset of the first item.
          example: 0
      tags:
        - Zap Templates
      security:
        - ClientIDAuthentication: []
      responses:
