                          steps:
                            - action: uag:1f188536-6dd0-4172-8414-2b90914ddee9
                              authentication: QVaPP2O1
                              inputs:
                                deal_stage: CLOSED_WON
                              title: Pacific Railway Golden spike hammered
                            - action: uag:1f188536-6dd0-4172-8414-2b90914ddaa7
