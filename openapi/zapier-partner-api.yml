      operationId: get-v2-zaps
      description: |-
        This endpoint returns a list of Zaps for the authenticated Zapier user.

        The `expand` array can be used to expand selected fields into full objects in the response.  Inputs with keys can
        also be passed to filter Zaps by certain criteria.

        #### When using OAuth

        This endpoint requires the `zap`, `zap:all`, or `zap:account:all` OAuth scopes.
      summary: Zapier Get Zaps [v2]
      parameters:
        - in: query
          name: expand
          schema:
            type: string
          description: A comma separated list of Zap fields that should be expanded from ids to full objects in the response. Fields that may not be expanded will remain as ids.
          example: steps.action
        - in: query
          name: include_shared
          schema:
            type: boolean
          description: If true, all Zaps that are shared with the user, rather than only those owned by them, are returned. If the zap:account:all scope is not present this has no effect.
          example: true
        - in: query
          name: inputs
          schema:
            type: string
          description: You may pass inputs[KEY]=VALUE1,VALUE2 to filter for Zaps that contain those settings. Keys are defined by your app on the developer platform.
          example: inputs[board]=BOARD_ID
        - in: query
          name: limit
          schema:
            type: integer
          description: Used for paginating results. Specifies the maximum number of items to return per page. If this value is not set, it defaults to 10.
          example: 10
        - in: query
          name: offset
          schema:
            type: integer
          description: Used for paginating results. Specifies the offset to use.
          example: 100
      tags:
        - Zaps
      security:
        - OAuth:
            - zap
            - zap:all
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExpandedZapsResponse'
              examples:
                /v2/zaps:
                  value:
                    - links:
                        next:
                        prev:
                      meta:
                        count: 1
                        offset: 0
                        limit:
                      data:
                        - type: zap
                          id: 00000000-0000-c000-8000-000000012345
                          is_enabled: false
                          last_successful_run_date: '2019-08-24T14:15:22Z'
