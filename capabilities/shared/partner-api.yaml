naftiko: 1.0.0-alpha1
info:
  label: Partner API
  description: '## Introduction'
  tags:
    - Accounts
    - Actions
    - Apps
    - Authentications
    - Categories
    - Experimental
    - Inputs
    - Outputs
    - Zaps
    - Zap Templates
  created: '2026-05-03'
  modified: '2026-05-03'
capability:
  consumes:
    - type: http
      namespace: partner-api
      baseUri: https://api.zapier.com
      description: '## Introduction'
      resources:
        - name: partner-api
          path: /
          description: '## Introduction'
          operations:
            - name: v1-apps-list
              method: GET
              path: /v1/apps
              description: Zapier Get Apps [v1]
              inputParameters:
                - name: category
                  in: query
                  type: string
                  required: false
                  description: Categories that apps must have in order to be returned in the response
                - name: is_in_zap_template_with
                  in: query
                  type: string
                  required: false
                  description: If set, only return apps that are in a Zap Template with your app
                - name: page
                  in: query
                  type: number
                  required: false
                  description: Which page to return
                - name: per_page
                  in: query
                  type: number
                  required: false
                  description: Number of results to return per page
                - name: title_search
                  in: query
                  type: string
                  required: false
                  description: Case-insensitive parameter to limit the results to apps whose titles match
                - name: title_starts_with
                  in: query
                  type: string
                  required: false
                  description: Case-insensitive parameter to only return apps whose titles start with the parameter value in the response
              outputRawFormat: json
            - name: v1-categories-list
              method: GET
              path: /v1/categories
              description: Zapier Get Categories
              inputParameters:
                - name: limit
                  in: query
                  type: number
                  required: false
                  description: Limit the number of Zap categories returned.
                - name: offset
                  in: query
                  type: number
                  required: false
                  description: The number of Zap categories to skip over. The default value is 0, which is the offset of the first item.
              outputRawFormat: json
            - name: v1-profiles-me-list
              method: GET
              path: /v1/profiles/me
              description: Zapier User Profile
              inputParameters: []
              outputRawFormat: json
            - name: v1-zap-templates-list
              method: GET
              path: /v1/zap-templates
              description: Zapier Get Zap Templates
              inputParameters:
                - name: apps
                  in: query
                  type: string
                  required: false
                  description: "A comma separated list of Zapier Apps to match Zap templates against. Note:\n- Your app will always be one of the apps in the template\n- The list will return Zap Templates
                    with all the provided apps, n"
                - name: limit
                  in: query
                  type: number
                  required: false
                  description: '(Max: 100) Limit the number of Zap templates returned.'
                - name: offset
                  in: query
                  type: number
                  required: false
                  description: The number of Zap templates to skip before beginning to return the Zap templates. The default value is 0, which is the offset of the first item.
              outputRawFormat: json
            - name: v1-zaps-list
              method: GET
              path: /v1/zaps
              description: Zapier Get Zaps [v1]
              inputParameters:
                - name: get_params
                  in: query
                  type: string
                  required: false
                  description: If set, guarantees that the 'params' of any node belonging to your app will be present in the response
                - name: limit
                  in: query
                  type: number
                  required: false
                  description: '(Max: 100) Limit the number of Zap templates returned.'
                - name: offset
                  in: query
                  type: number
                  required: false
                  description: The number of Zap templates to skip before beginning to return the Zap templates. The default value is 0, which is the offset of the first item.
                - name: params__{{KEY}}
                  in: query
                  type: string
                  required: false
                  description: Filter for Zaps that contain the given parameter's {{KEY}} and the value of the query parameter. Keys are defined by your app on the [developer 
                    platform](https://zapier.com/platform/login).
              outputRawFormat: json
            - name: create-action-run
              method: POST
              path: /v2/action-runs
              description: Zapier Create an Action Run
              inputParameters: []
              outputRawFormat: json
            - name: retrieve-action-run
              method: GET
              path: /v2/action-runs/{id}
              description: Zapier Retrieve Action Run
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: An Action Run ID.
              outputRawFormat: json
            - name: get-actions
              method: GET
              path: /v2/actions
              description: Zapier Get Actions
              inputParameters:
                - name: action_type
                  in: query
                  type: string
                  required: false
                  description: The type of Action to filter for. Defaults to returning all actions regardless of type.
                - name: app
                  in: query
                  type: string
                  required: true
                  description: A canonical App ID, as provided by the `/apps` endpoint.
              outputRawFormat: json
            - name: get-fields-inputs
              method: POST
              path: /v2/actions/{action_id}/inputs
              description: Zapier Get Input Fields
              inputParameters:
                - name: action_id
                  in: path
                  type: string
                  required: true
                  description: An Action ID, as provided by the `/actions` endpoint.
              outputRawFormat: json
            - name: get-choices
              method: POST
              path: /v2/actions/{action_id}/inputs/{input_id}/choices
              description: Zapier Get Choices
              inputParameters:
                - name: action_id
                  in: path
                  type: string
                  required: true
                  description: An Action ID, as provided by the `/actions` endpoint.
                - name: input_id
                  in: path
                  type: string
                  required: true
                  description: An Input Field ID, as provided by the `/inputs` endpoint.
                - name: page
                  in: query
                  type: string
                  required: false
                  description: The page of choices to return, defaults to the first
              outputRawFormat: json
            - name: get-fields-outputs
              method: POST
              path: /v2/actions/{action_id}/outputs
              description: Zapier Get Output Fields
              inputParameters:
                - name: action_id
                  in: path
                  type: string
                  required: true
                  description: An Action ID, as provided by the `/actions` endpoint.
              outputRawFormat: json
            - name: test-action
              method: POST
              path: /v2/actions/{action_id}/test
              description: Zapier Step Test
              inputParameters:
                - name: action_id
                  in: path
                  type: string
                  required: true
                  description: An Action ID, as provided by the `/actions` endpoint.
              outputRawFormat: json
            - name: get-v2-apps
              method: GET
              path: /v2/apps
              description: Zapier Get Apps [v2]
              inputParameters:
                - name: category
                  in: query
                  type: string
                  required: false
                  description: "Categories that apps must have in order to be returned in the response. \nThe full list of valid categories can be retrieved using the `category` endpoint, detailed [here](https://platform.zapier.com/e"
                - name: ids
                  in: query
                  type: string
                  required: false
                  description: Parameter to restrict the results to apps whose ID matches those in the provided comma-separated value. Cannot be combined with `category`.
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Used for paginating results. Specifies the maximum number of items to return per page. If this value is not set, it defaults to 10.
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: Used for paginating results. Specifies the offset to use.
                - name: query
                  in: query
                  type: string
                  required: false
                  description: Parameter to limit the results to apps whose titles match the provided query.
              outputRawFormat: json
            - name: get-authentications
              method: GET
              path: /v2/authentications
              description: Zapier Get Authentications
              inputParameters:
                - name: app
                  in: query
                  type: string
                  required: true
                  description: A canonical App ID, as provided by the `/apps` endpoint.
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Used for paginating results. Specifies the maximum number of items to return per page. If this value is not set, it defaults to 10.
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: Used for paginating results. Specifies the offset to use.
              outputRawFormat: json
            - name: create-authentication
              method: POST
              path: /v2/authentications
              description: Zapier Create Authentication
              inputParameters: []
              outputRawFormat: json
            - name: v2-authorize-list
              method: GET
              path: /v2/authorize
              description: Zapier Create Account
              inputParameters:
                - name: client_id
                  in: query
                  type: string
                  required: true
                  description: Your application Client ID.
                - name: redirect_uri
                  in: query
                  type: string
                  required: true
                  description: The page the user will be redirect to after OAuth flow.
                - name: referer
                  in: query
                  type: string
                  required: false
                  description: ''
                - name: response_type
                  in: query
                  type: string
                  required: true
                  description: Only OAuth response type `code` is supported
                - name: scope
                  in: query
                  type: string
                  required: true
                  description: Space (`%20`) separated values
                - name: sign_up_email
                  in: query
                  type: string
                  required: false
                  description: Email of the user signing up.
                - name: sign_up_first_name
                  in: query
                  type: string
                  required: false
                  description: First name of the user signing up.
                - name: sign_up_last_name
                  in: query
                  type: string
                  required: false
                  description: Last name of the user signing up.
                - name: utm_campaign
                  in: query
                  type: string
                  required: false
                  description: ''
                - name: utm_content
                  in: query
                  type: string
                  required: false
                  description: ''
                - name: utm_medium
                  in: query
                  type: string
                  required: false
                  description: ''
                - name: utm_source
                  in: query
                  type: string
                  required: false
                  description: ''
              outputRawFormat: json
            - name: create-zap-guess
              method: POST
              path: /v2/guess
              description: Zapier Guess a Zap [Beta]
              inputParameters:
                - name: client_id
                  in: query
                  type: string
                  required: true
                  description: See our authentication documentation for how to find your client ID
              outputRawFormat: json
            - name: v2-whitelabel-apps-list
              method: GET
              path: /v2/whitelabel/apps
              description: Zapier Get Whitelabel Apps [v2]
              inputParameters:
                - name: category
                  in: query
                  type: string
                  required: false
                  description: Filter apps by category slug.
                - name: limit
                  in: query
                  type: number
                  required: false
                  description: Limit the number of apps returned.
                - name: offset
                  in: query
                  type: number
                  required: false
                  description: The number of apps to skip before beginning to return results.
                - name: search
                  in: query
                  type: string
                  required: false
                  description: Case-insensitive search to filter apps by title.
              outputRawFormat: json
            - name: get-zap-runs
              method: GET
              path: /v2/zap-runs
              description: Zapier Get Zap Runs
              inputParameters:
                - name: from_date
                  in: query
                  type: string
                  required: false
                  description: Filter Zap runs that occurred on or after this date. If not provided, the results default to Zap runs from the last 30 days.
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Used for paginating results. Specifies the maximum number of items to return per page. If this value is not set, it defaults to 10.
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: Used for paginating results. Specifies the offset to use.
                - name: search
                  in: query
                  type: string
                  required: false
                  description: Performs a text search against the zap_title, data_in, and data_out fields, returning only zap runs that match the specified keywords.
                - name: statuses
                  in: query
                  type: array
                  required: false
                  description: Accepts one or more status values separated by comma, enabling the filtering of zap runs based on the specified status or statuses provided.
                - name: to_date
                  in: query
                  type: string
                  required: false
                  description: Filter Zap runs that occurred before this date.
                - name: zap_id
                  in: query
                  type: integer
                  required: false
                  description: Find Zap runs for the specified Zap ID.
              outputRawFormat: json
            - name: get-v2-zaps
              method: GET
              path: /v2/zaps
              description: Zapier Get Zaps [v2]
              inputParameters:
                - name: expand
                  in: query
                  type: string
                  required: false
                  description: A comma separated list of Zap fields that should be expanded from ids to full objects in the response. Fields that may not be expanded will remain as ids.
                - name: include_shared
                  in: query
                  type: boolean
                  required: false
                  description: If true, all Zaps that are shared with the user, rather than only those owned by them, are returned. If the zap:account:all scope is not present this has no effect.
                - name: inputs
                  in: query
                  type: string
                  required: false
                  description: You may pass inputs[KEY]=VALUE1,VALUE2 to filter for Zaps that contain those settings. Keys are defined by your app on the developer platform.
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Used for paginating results. Specifies the maximum number of items to return per page. If this value is not set, it defaults to 10.
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: Used for paginating results. Specifies the offset to use.
              outputRawFormat: json
            - name: post-zaps
              method: POST
              path: /v2/zaps
              description: Zapier Create a Zap
              inputParameters:
                - name: expand
                  in: query
                  type: string
                  required: false
                  description: A comma separated list of Zap fields that should be expanded from ids to full objects in the response. Fields that may not be expanded will remain as ids.
              outputRawFormat: json
      authentication:
        type: apikey
        key: client_id
        value: '{{API_KEY}}'
        placement: query
