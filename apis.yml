  https://raw.githubusercontent.com/api-evangelist/zapier/refs/heads/main/apis.yml
apis:
  - aid: zapier:zapier
    name: Zapier
    tags:
      - Integrations
      - iPaaS
    humanURL: ' https://zapier.com/'
    properties:
      - url: ' https://zapier.com/'
        type: Documentation
      - url: https://docs.zapier.com/platform/home
        type: Documentation
      - url: https://zapier.com/developer-platform/integrations
        type: GettingStarted
      - url: https://developer.zapier.com/
        type: Portal
      - url: https://docs.zapier.com/platform/build/apikeyauth
        type: Authentication
      - url: https://github.com/zapier/zapier-platform
        type: GitHubOrg
    description: >-
      Build and ship AI workflows in minutesno IT bottlenecks, no complexity.
      Just results.
  - aid: zapier:partner-api
    name: Zapier Partner API
    tags:
      - Embed
      - Integrations
      - iPaaS
      - Partners
    humanURL: https://zapier.com/developer-platform/workflow-api
    properties:
      - url: https://zapier.com/developer-platform/workflow-api
        type: Documentation
      - url: https://zapier.com/developer-platform/embed-tools
        type: Documentation
      - url: https://zapier.com/blog/zapier-partner-api-overview/
        type: BlogPost
      - url: https://zapier.com/developer-platform/partner-embeds
        type: UseCases
    description: >-
      The Zapier Partner API and Workflow API allow developers to embed
      Zapier automation directly in their products, providing complete style
      control over the user experience. The API supports Zap templates,
      user Zap management, app directory access, and embedded workflow
      editors with custom branding, enabling integration marketplaces and
      in-app automation at enterprise scale.
  - aid: zapier:ai-actions-api
    name: Zapier AI Actions API
    tags:
      - AI
      - iPaaS
      - LLM
      - NaturalLanguage
    humanURL: https://actions.zapier.com/
    properties:
      - url: https://actions.zapier.com/
        type: Documentation
      - url: https://docs.zapier.com/platform/reference/ai-actions
        type: Documentation
    description: >-
      Zapier AI Actions (formerly Natural Language Actions) provides a
      universal natural language API optimized for AI and LLM-based
      experiences. It enables AI platforms and custom integrations to
      leverage over 20,000 searches and actions across the Zapier
      ecosystem, handling authentication and API integration automatically.
      Supported natively on platforms including GPTs, Claude, LangChain,
      and LlamaIndex.
  - aid: zapier:mcp
    name: Zapier MCP
    tags:
      - AI
      - iPaaS
      - MCP
      - ModelContextProtocol
    humanURL: https://zapier.com/mcp
    properties:
      - url: https://zapier.com/mcp
        type: Documentation
      - url: https://docs.zapier.com/mcp/home
        type: Documentation
      - url: https://github.com/zapier/zapier-mcp
        type: GitHubOrg
    description: >-
      Zapier MCP (Model Context Protocol) connects AI tools like Claude,
      ChatGPT, and Cursor to over 8,000 apps using the open Model Context
      Protocol standard. It provides a server endpoint for connecting a
      Zapier account to an AI client, with meta-tools available immediately
      and configurable actions exposed as dedicated tools. Supports API key
      authentication for personal use and OAuth for multi-user
      applications.
